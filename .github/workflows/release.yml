name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Plugin
        run: ./gradlew patchPluginXml buildPlugin

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: build/distributions/*.zip

  build-cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache-dependency-path: cli/go.sum

      - name: Build CLI
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          VERSION="${{ github.ref_name }}"
          BUILD_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          go build -ldflags "-X main.version=${VERSION} -X main.buildTime=${BUILD_TIME}" -o "intellij-cli${EXT}" .
          zip "intellij-cli-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "intellij-cli${EXT}"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: cli/intellij-cli-${{ matrix.goos }}-${{ matrix.goarch }}.zip

  generate-skill:
    runs-on: ubuntu-latest
    needs: build-cli
    steps:
      - name: Download linux/amd64 CLI
        uses: actions/download-artifact@v4
        with:
          name: cli-linux-amd64
          path: ./

      - name: Generate skill.md
        run: |
          unzip intellij-cli-linux-amd64.zip
          chmod +x intellij-cli
          ./intellij-cli skill print > skill.md

      - name: Upload skill artifact
        uses: actions/upload-artifact@v4
        with:
          name: skill
          path: skill.md

  release:
    runs-on: ubuntu-latest
    needs: [build-plugin, build-cli, generate-skill]
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          make_latest: true
          files: |
            artifacts/*.zip
            artifacts/skill.md
